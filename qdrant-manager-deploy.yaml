---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: asst-qdrant-manager
  labels:
    app: asst-qdrant-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: asst-qdrant-manager
  template:
    metadata:
      labels:
        app: asst-qdrant-manager
    spec:
      containers:
        - name: asst-qdrant
          image: registry.seculayer.com:31500/eyecloudai/asst-qdrant:3.0-2026-asst-R2
          imagePullPolicy: Always
          ports:
            - containerPort: 6333
          env:
            - name: TZ
              value: Asia/Seoul
          volumeMounts:
            - name: timezone-config
              mountPath: /etc/localtime
            - name: asst-qdrant-storage
              mountPath: /qdrant/storage
            - name: asst-qdrant-snapshots
              mountPath: /qdrant/snapshots

          command:
            - sh
            - -c
            - |
              # snapshots_recovery_tmp 초기화
              RECOVERY_TMP=/qdrant/storage/snapshots_recovery_tmp
              if [ -d "$RECOVERY_TMP" ]; then
                echo "[qdrant] Cleaning snapshots_recovery_tmp..."
                rm -rf "$RECOVERY_TMP"/*
              fi

              # 스냅샷 확인
              SNAPSHOT_FILE=$(ls /qdrant/snapshots/full-snapshot*.snapshot 2>/dev/null | sort -r | head -n 1)
              if [ -n "$SNAPSHOT_FILE" ]; then
                # 컬렉션이 이미 존재하면 복구 건너뛰기
                if [ -d "/qdrant/storage/collections" ] && [ "$(ls -A /qdrant/storage/collections)" ]; then
                  echo "[qdrant] Collections exist. Skipping snapshot recovery..."
                  ./qdrant
                else
                  echo "[qdrant] Found snapshot: $SNAPSHOT_FILE. Starting with snapshot restoration..."
                  ./qdrant --storage-snapshot "$SNAPSHOT_FILE"
                fi
              else
                echo "[qdrant] No snapshot found. Starting normally..."
                ./qdrant
              fi

        - name: asst-qdrant-manager
          image: registry.seculayer.com:31500/eyecloudai/asst-qdrant-manager:3.0-2026-asst-R2
          imagePullPolicy: Always
          command: [ "python", "src/QdrantManagerServer.py" ]
          ports:
              - containerPort: 6335
          env:
              - name: TZ
                value: Asia/Seoul
          volumeMounts:
            - name: timezone-config
              mountPath: /etc/localtime
            - name: asst-qdrant-data-volume
              mountPath: /eyeCloudAI/data/vectordb/docs
            - name: asst-qdrant-manager-conf
              mountPath: /eyeCloudAI/app/conf

      volumes:
        - name: timezone-config
          hostPath:
            path: /usr/share/zoneinfo/Asia/Seoul

        - name: asst-qdrant-storage
          hostPath:
            path: /eyeCloudAI/data/vectordb/qdrant/storage

        - name: asst-qdrant-snapshots
          hostPath:
            path: /eyeCloudAI/data/vectordb/qdrant/snapshots

        - name: asst-qdrant-data-volume
          hostPath:
            path: /eyeCloudAI/data/vectordb/docs

        - name: asst-qdrant-manager-conf
          configMap:
            name: asst-qdrant-manager-conf

      nodeSelector:
        app: "true"
        master: "true"
---
kind: Service
apiVersion: v1
metadata:
  name: asst-qdrant-manager-svc
spec:
  type: "NodePort"
  selector:
    app: asst-qdrant-manager
  ports:
    - name: "qdrant"
      port: 6333
      targetPort: 6333
      nodePort: 36333

    - name: "qdrant-manager"
      port: 6335
      targetPort: 6335
      nodePort: 36335
